base_model: voidful/Qwen3.5-27B-earica
low_cpu_mem_usage: true

plugins:
  - axolotl.integrations.drift_only.DriftOnlyPlugin
  - axolotl.integrations.liger.LigerPlugin

liger_rms_norm: true
liger_glu_activation: true

drift_only_trainer: true
drift_only_reliability_beta: 0.5
drift_only_reliability_tau: 1.0
drift_only_epsilon_min: 0.01
drift_only_epsilon_max: 1.0
drift_only_kl_lambda: 1.0
drift_only_use_smooth_objective: true
drift_only_ema_decay: 0.999
drift_only_gamma: 1.0

datasets:
  - path: voidful/gemini-3.1-opus-4.6-reasoning-merged_v2
    type: chat_template
    split: train

dataset_prepared_path: ./prepared_data/drift_only_27b_dt


chat_template: qwen3_5

sequence_len: 8192
sample_packing: true
pad_to_sequence_len: false

gradient_accumulation_steps: 2
micro_batch_size: 1
batch_flattening: false
group_by_length: true
num_epochs: 3
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 2e-5

bf16: true
gradient_checkpointing: true
flash_attention: true
dataloader_num_workers: 4
val_set_size: 0.05
save_strategy: epoch
output_dir: ./outputs/drift-drift-only-27b-dt

deepspeed: deepspeed_configs/zero2.json

hub_model_id: voidful/Qwen3.5-27B-gemini-3.1-opus-4.6-reasoning-drift-only
push_to_hub: true
hub_strategy: end

log_on_each_node: false
logging_steps: 1
