# Baseline config for standard LoRA fine-tuning (without RCCA-TR)
base_model: Qwen/Qwen3.5-9B

plugins:
  - axolotl.integrations.liger.LigerPlugin

liger_rms_norm: true
liger_glu_activation: true

# Enable Full Fine-Tuning (no adapter)

# Dataset
datasets:
  - path: voidful/earica_text_train
    type: chat_template
    field_messages: conversations
    split: train

dataset_prepared_path: ./prepared_data/baseline

chat_template: qwen3_5

# Training settings
sequence_len: 16384
sample_packing: true
pad_to_sequence_len: true

gradient_accumulation_steps: 4
micro_batch_size: 1
num_epochs: 3
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 2e-5

bf16: true
gradient_checkpointing: true
flash_attention: true

dataloader_num_workers: 0

deepspeed: deepspeed_configs/zero2.json

val_set_size: 0.05

save_strategy: epoch

output_dir: ./outputs/baseline-fft

hub_model_id: voidful/Qwen3.5-9B-earica-fft-baseline
push_to_hub: true
hub_strategy: end

log_on_each_node: false
logging_steps: 1
