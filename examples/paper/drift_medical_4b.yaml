# drift-loss paper — drift-loss on Medical SFT
# Battle C: Domain Specialization
# Model: Qwen3.5-4B with drift-loss (recommended hyperparameters)

base_model: Qwen/Qwen3.5-4B
low_cpu_mem_usage: true

plugins:
  - axolotl.integrations.drift.DriftPlugin
  - axolotl.integrations.liger.LigerPlugin

liger_rms_norm: true
liger_glu_activation: true

# drift-loss hyperparameters (recommended)
drift_trainer: true
drift_reference_mode: ema
drift_ema_decay: 0.99          # shorter EMA memory
drift_gamma: 3.0               # stronger usefulness focusing
drift_detach_weights: true     # paper default

datasets:
  - path: ./data/paper/medical_flashcards_10k.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    split: train

dataset_prepared_path: ./prepared_data/paper/drift_medical_4b

chat_template: qwen3_5

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: false

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 3
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 2e-5
warmup_ratio: 0.03
weight_decay: 0.01
seed: 42

bf16: true
gradient_checkpointing: true
flash_attention: true
dataloader_num_workers: 4

val_set_size: 0.05
save_strategy: epoch
eval_strategy: epoch
output_dir: ./outputs/paper/drift-medical-4b

logging_steps: 1
