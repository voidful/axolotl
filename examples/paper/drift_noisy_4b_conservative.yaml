# Drift-Trust Paper — ABLATION: Conservative hyperparameters
# Purpose: Demonstrate that low anchor_weight and high lambda are critical
# Model: Qwen3.5-4B with conservative (weak) drift parameters

base_model: Qwen/Qwen3.5-4B
low_cpu_mem_usage: true

plugins:
  - axolotl.integrations.drift.DriftPlugin
  - axolotl.integrations.liger.LigerPlugin

liger_rms_norm: true
liger_glu_activation: true

# --- Drift-Trust hyperparameters (conservative / weak) ---
drift_trainer: true
drift_reliability_beta: 0.5
drift_reliability_tau: 1.0
drift_epsilon_min: 0.01
drift_epsilon_max: 1.0
drift_kl_lambda: 1.0              # weak modulation (ablation)
drift_use_smooth_objective: true
drift_ema_decay: 0.999            # slow adaptation (ablation)
drift_gamma: 1.0                  # low sensitivity (ablation)
drift_anchor_weight: 0.5          # high floor = weak noise suppression (ablation)

datasets:
  - path: ./data/paper/ultrafeedback_noisy_25pct_10k.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    split: train

dataset_prepared_path: ./prepared_data/paper/drift_noisy_4b_conservative

chat_template: qwen3_5

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: false

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 3
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 2e-5
warmup_ratio: 0.03
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
flash_attention: true
dataloader_num_workers: 4

val_set_size: 0.05
save_strategy: epoch
eval_strategy: epoch
output_dir: ./outputs/paper/drift-noisy-4b-conservative

logging_steps: 1
