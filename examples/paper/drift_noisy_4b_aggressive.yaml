# Drift-Trust Paper — Route B1: Aggressive Filter on Noisy UltraFeedback
# Battle A: Extreme hyperparameters to maximize noise suppression
# Model: Qwen3.5-4B with aggressive drift parameters

base_model: Qwen/Qwen3.5-4B
low_cpu_mem_usage: true

plugins:
  - axolotl.integrations.drift.DriftPlugin
  - axolotl.integrations.liger.LigerPlugin

liger_rms_norm: true
liger_glu_activation: true

# --- Drift-Trust hyperparameters (Aggressive) ---
drift_trainer: true
drift_reliability_beta: 0.5
drift_reliability_tau: 1.0
drift_epsilon_min: 0.01
drift_epsilon_max: 1.0
drift_kl_lambda: 4.0            # 4x modulation for clean tokens
drift_use_smooth_objective: true
drift_ema_decay: 0.99            # Faster adaptation (shorter memory)
drift_gamma: 3.0                 # Very sensitive to CE deviation
drift_anchor_weight: 0.1         # Near-zero gradient floor for noisy tokens

datasets:
  - path: ./data/paper/ultrafeedback_noisy_25pct_10k.jsonl
    ds_type: json
    type: chat_template
    field_messages: conversations
    split: train

dataset_prepared_path: ./prepared_data/paper/drift_noisy_4b_aggressive

chat_template: qwen3_5

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: false

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 3
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 2e-5
warmup_ratio: 0.03
weight_decay: 0.01

bf16: true
gradient_checkpointing: true
flash_attention: true
dataloader_num_workers: 4

val_set_size: 0.05
save_strategy: epoch
eval_strategy: epoch
output_dir: ./outputs/paper/drift-noisy-4b-aggressive

logging_steps: 1
